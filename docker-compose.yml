services:
  app:
    container_name: nextjs-admin
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '127.0.0.1:3000:3000'
    env_file:
      - .env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1:3000']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - express-core-network

networks:
  express-core-network:
    external: true
